spring:
  datasource:
    url: jdbc:h2:mem:healthcare_test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
  cache:
    type: simple   # in-memory cache for tests, no real Redis needed

app:
  cache:
    redis-enabled: false
  jwt:
    secret: test-secret-key-for-junit-tests-only-not-for-production-use-0123456789
    expiration-ms: 3600000
  encryption:
    key: dGhpc2lzYTMyYnl0ZWtleWZvcmRlbW9wdXJwb3Nlcw==
